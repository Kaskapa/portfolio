services:
  portfolio-app:
    build:
      context: .
      target: deps
    container_name: portfolio_app
    networks:
      - portfolio_net

  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio-app
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge
