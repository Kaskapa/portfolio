services:
  portfolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_app
    restart: always
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio-app
